<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Onboarding{% endblock %}</title>
    <style>
      :root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#9fb1d1; --accent:#7aa2ff; --danger:#ff6b6b; --border:#22304d; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: linear-gradient(180deg, #070b14, var(--bg)); color: var(--text); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .container { max-width: 1100px; margin: 0 auto; padding: 28px 16px; }
      .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 18px; }
      .brand { font-weight: 700; letter-spacing: .2px; }
      .card { background: rgba(17,26,46,.85); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      .muted { color: var(--muted); }
      .btn { display:inline-flex; align-items:center; justify-content:center; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f1830; color: var(--text); cursor:pointer; }
      .btn:hover { filter: brightness(1.1); }
      .btn.primary { border-color: rgba(122,162,255,.5); background: rgba(122,162,255,.14); }
      .btn.danger { border-color: rgba(255,107,107,.5); background: rgba(255,107,107,.12); }
      table { width: 100%; border-collapse: collapse; overflow:hidden; border-radius: 12px; }
      th, td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
      th { text-align:left; color: var(--muted); font-weight: 600; font-size: 13px; }
      .row-actions { display:flex; gap:8px; flex-wrap:wrap; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .field label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
      .field input { width: 100%; padding: 10px 10px; border-radius: 10px; border: 1px solid var(--border); background: #0b1326; color: var(--text); }
      .field input:focus { outline: 2px solid rgba(122,162,255,.35); outline-offset: 2px; }
      .footer-actions { display:flex; justify-content:flex-end; gap:10px; margin-top: 14px; flex-wrap:wrap; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand"><a href="/employees">Onboarding MVC</a></div>
        <div class="muted">Lab 3: Employees</div>
      </div>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
